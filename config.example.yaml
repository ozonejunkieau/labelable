# Labelable Configuration
# Copy this file to config.yaml and update with your settings

# Queue timeout in seconds (jobs older than this are dropped)
queue_timeout_seconds: 300

# Directory containing label template YAML files
templates_dir: ./templates

# API key for external access (optional)
# If set, API requests must include this key via:
#   - X-API-Key header
#   - Authorization: Bearer <key> header
#   - api_key query parameter
# Requests via Home Assistant Ingress (sidebar) bypass this check.
# api_key: your-secret-key-here

# User mapping for Home Assistant Ingress (maps HA user IDs to display names)
# Get user IDs from Home Assistant: Settings > People > click user > see URL
user_mapping:
  # "abc123-def456-user-uuid": "Your Name"

# Default user when not accessed via HA or user not in mapping
default_user: ""

# Enable MCP server for AI assistant integration (optional)
# Mounts at /mcp using Streamable HTTP transport
# Requires: uv sync --group mcp
# mcp_enabled: true

# Cloudflare Queue consumer (optional)
# Receives print jobs pushed to a Cloudflare Queue by external systems
# (e.g. the Labelable Obsidian plugin). The consumer polls the queue in the
# background and dispatches jobs to the appropriate printer and template.
#
# The API token needs Cloudflare Queues Read permission.
# Alternatively, leave api_token blank and set LABELABLE_CF_API_TOKEN env var.
#
# cloudflare_queue:
#   enabled: true
#   account_id: "your-cloudflare-account-id"
#   queue_id: "your-queue-id"
#   api_token: ""               # or set LABELABLE_CF_API_TOKEN env var
#   poll_interval_seconds: 5    # how often to poll for new messages
#   batch_size: 10              # max messages to pull per request
#   visibility_timeout_ms: 30000  # ms before unacked message is re-delivered

# Printer definitions
printers:
  # ZPL printer over TCP
  - name: warehouse-zpl
    type: zpl
    connection:
      type: tcp
      host: 192.168.1.100
      port: 9100  # Default ZPL port
    healthcheck:
      interval: 60
      command: "~HS"  # Host status query

  # EPL2 printer over TCP
  # - name: office-epl
